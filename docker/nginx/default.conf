server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire JS должен обслуживаться Laravel роутом, а не блоком статических файлов.
    location ^~ /livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Файлы из /storage должны либо отдаваться как статика (если есть symlink),
    # либо падать в Laravel fallback-роут /storage/{path}.
    location ^~ /storage {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }
}
