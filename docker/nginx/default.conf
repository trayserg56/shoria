server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self' https: http: data: blob: 'unsafe-inline' 'unsafe-eval'; base-uri 'self'; frame-ancestors 'self'; form-action 'self' https: http:;" always;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire JS должен обслуживаться Laravel роутом, а не блоком статических файлов.
    location ^~ /livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Файлы из /storage должны либо отдаваться как статика (если есть symlink),
    # либо падать в Laravel fallback-роут /storage/{path}.
    location ^~ /storage {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $fastcgi_script_name =404;
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }
}
