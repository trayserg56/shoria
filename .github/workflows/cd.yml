name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git checkout main
            git pull --ff-only origin main
            docker compose exec -T app php artisan migrate --force
            docker compose run --rm -T node npm run build
            rm -rf backend/public/assets
            cp -a frontend/dist/. backend/public/
            cp frontend/dist/index.html backend/public/spa-index.html
            docker compose restart nginx
            sleep 3

            EXPECTED_JS=$(sed -n 's@.*src="/assets/\([^"]*\.js\)".*@\1@p' frontend/dist/index.html | head -n 1)
            EXPECTED_CSS=$(sed -n 's@.*href="/assets/\([^"]*\.css\)".*@\1@p' frontend/dist/index.html | head -n 1)
            test -n "$EXPECTED_JS"
            test -n "$EXPECTED_CSS"

            # Smoke 1: fallback SPA index must reference freshly built assets.
            grep -q "$EXPECTED_JS" backend/public/spa-index.html
            grep -q "$EXPECTED_CSS" backend/public/spa-index.html

            # Smoke 2: nginx root should return HTML with the same assets.
            RENDERED_HTML=$(docker compose exec -T nginx wget -qO- http://127.0.0.1/)
            echo "$RENDERED_HTML" | grep -q "$EXPECTED_JS"
            echo "$RENDERED_HTML" | grep -q "$EXPECTED_CSS"

            # Smoke 3: API must be reachable through nginx after deploy.
            API_PRODUCTS=$(docker compose exec -T nginx wget -qO- http://127.0.0.1/api/products)
            echo "$API_PRODUCTS" | grep -Eq '\[|\{'
